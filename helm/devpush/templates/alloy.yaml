apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  labels:
    app.kubernetes.io/component: alloy
    {{- include "devpush.labels" . | nindent 4 }}
data:
  config.alloy: |
    logging {
      level = "info"
      format = "logfmt"
    }

    discovery.kubernetes "pods" {
      role = "pod"
      namespaces {
        names = ["{{ .Release.Namespace }}"]
      }
    }

    discovery.relabel "pods" {
      targets = discovery.kubernetes.pods.targets

      rule {
        action = "replace"
        source_labels = ["__meta_kubernetes_namespace"]
        target_label = "namespace"
      }

      rule {
        action = "replace"
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label = "pod"
      }

      rule {
        action = "replace"
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label = "container"
      }

      rule {
        action = "replace"
        source_labels = ["__meta_kubernetes_pod_label_devpush_project_id"]
        target_label = "project_id"
      }

      rule {
        action = "replace"
        source_labels = ["__meta_kubernetes_pod_label_devpush_deployment_id"]
        target_label = "deployment_id"
      }

      rule {
        action = "replace"
        source_labels = ["__meta_kubernetes_pod_label_devpush_environment_id"]
        target_label = "environment_id"
      }

      rule {
        action = "replace"
        replacement = "stdout"
        target_label = "stream"
      }
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.pods.output
      forward_to = [loki.write.default.receiver]
    }

    loki.write "default" {
      endpoint {
        url = "http://loki:3100/loki/api/v1/push"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devpush.fullname" . }}-alloy
  labels:
    app.kubernetes.io/component: alloy
    {{- include "devpush.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: alloy
      {{- include "devpush.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: alloy
        {{- include "devpush.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.alloyName | quote }}
      containers:
        - name: alloy
          image: {{ .Values.alloy.image | quote }}
          imagePullPolicy: IfNotPresent
          args:
            - run
            - /etc/alloy/config.alloy
          ports:
            - containerPort: 12345
          volumeMounts:
            - name: alloy-config
              mountPath: /etc/alloy
          resources:
            {{- toYaml .Values.alloy.resources | nindent 12 }}
      volumes:
        - name: alloy-config
          configMap:
            name: alloy-config
