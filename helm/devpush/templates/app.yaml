apiVersion: v1
kind: Service
metadata:
  name: app
  labels:
    app.kubernetes.io/component: app
    {{- include "devpush.labels" . | nindent 4 }}
spec:
  type: {{ .Values.app.service.type }}
  ports:
    - name: http
      port: {{ .Values.app.service.port }}
      targetPort: 8000
  selector:
    app.kubernetes.io/component: app
    {{- include "devpush.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devpush.fullname" . }}-app
  labels:
    app.kubernetes.io/component: app
    {{- include "devpush.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.app.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: app
      {{- include "devpush.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: app
        {{- include "devpush.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.controlPlaneName | quote }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.devSource.enabled }}
          command: ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--loop", "uvloop"]
          {{- else }}
          command: ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--loop", "uvloop", "--workers", "4", "--proxy-headers", "--forwarded-allow-ips=*"]
          {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "devpush.envSecretName" . }}
          env:
            - name: SERVICE_UID
              value: {{ .Values.service.uid | quote }}
            - name: SERVICE_GID
              value: {{ .Values.service.gid | quote }}
            - name: HOST_DATA_DIR
              value: {{ .Values.data.mountPath | quote }}
            {{- if .Values.devSource.enabled }}
            - name: UV_PROJECT_ENVIRONMENT
              value: /opt/venv
            {{- end }}
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          volumeMounts:
            - name: devpush-data
              mountPath: {{ .Values.data.mountPath }}
            {{- if .Values.devSource.enabled }}
            - name: dev-source
              mountPath: {{ .Values.devSource.mountPath | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
      volumes:
        - name: devpush-data
          persistentVolumeClaim:
            claimName: {{ include "devpush.fullname" . }}-data
        {{- if .Values.devSource.enabled }}
        - name: dev-source
          hostPath:
            path: {{ required "devSource.hostPath is required when devSource.enabled=true" .Values.devSource.hostPath | quote }}
            type: {{ .Values.devSource.hostPathType | quote }}
        {{- end }}
